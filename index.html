<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SBDAV Bus Register</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --ink:#33383F;
    --ink-2:#262A30;
    --paper:#F1F4F7;
    --card:#FFFFFF;
    --sky:#4FA8DA;
    --sky-deep:#2E86C1;
    --sky-pale:#E7F3FB;
    --present:#2E9E6B;
    --present-soft:#DDF0E7;
    --waiting:#E3A93A;
    --waiting-soft:#FBF0DA;
    --alert:#D8543F;
    --alert-soft:#FBE2DD;
    --absent:#788290;
    --absent-soft:#E2E6EC;
    --grey:#6B7280;
    --grey-light:#A7AEB8;
    --line:#DCE2E8;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{font-family:'Space Grotesk',system-ui,sans-serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  #app{max-width:1180px;margin:0 auto;padding:0 20px 64px;}

  header.top{
    background:var(--ink); color:#fff; margin:0 -20px 28px; padding:22px 24px 0;
    border-radius:0 0 20px 20px;
  }
  .top-row{display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; padding-bottom:18px;}
  .brand{display:flex; align-items:center; gap:12px;}
  .brand-mark{
    width:40px;height:40px;border-radius:10px;background:var(--sky);
    display:flex;align-items:center;justify-content:center;
    font-family:'Space Grotesk';font-weight:700;color:#fff;font-size:15px;
    flex:none;
  }
  .brand-text h1{margin:0;font-size:19px;letter-spacing:0.2px;}
  .brand-text p{margin:2px 0 0;font-size:12.5px;color:#B7C0CA;}
  .header-actions{display:flex;align-items:center;gap:10px;}
  .switch-app{
    border:1px solid rgba(255,255,255,0.25); background:transparent;color:#E4E9EF;
    padding:8px 14px;border-radius:9px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:'Inter';
  }
  .switch-app:hover{background:rgba(255,255,255,0.08);}

  .subtabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
  .subtabs button{
    border:1px solid var(--line); background:var(--card); color:var(--grey);
    padding:8px 14px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter';
  }
  .subtabs button.active{background:var(--sky);border-color:var(--sky);color:#fff;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:18px;}
  .card h2{margin:0 0 4px;font-size:17px;}
  .card .sub{color:var(--grey);font-size:13px;margin:0 0 16px;}
  .grid-2{display:grid;grid-template-columns:1.1fr 1fr;gap:18px;}
  @media (max-width:820px){.grid-2{grid-template-columns:1fr;}}

  label{font-size:12.5px;font-weight:600;color:var(--grey);display:block;margin-bottom:5px;}
  input[type=text], input[type=date], select, textarea{
    width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;
    font-family:'Inter';font-size:13.5px;background:#fff;color:var(--ink);
  }
  input:focus, select:focus, textarea:focus{outline:2px solid var(--sky-deep);outline-offset:0;}
  .field{margin-bottom:12px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .row > *{flex:1;min-width:140px;}

  .btn{
    border:none;border-radius:9px;padding:9px 16px;font-weight:600;font-size:13.5px;
    cursor:pointer;font-family:'Inter';display:inline-flex;align-items:center;gap:6px;
  }
  .btn-primary{background:var(--ink);color:#fff;}
  .btn-primary:hover{background:var(--ink-2);}
  .btn-sky{background:var(--sky);color:#fff;}
  .btn-sky:hover{background:var(--sky-deep);}
  .btn-ghost{background:transparent;color:var(--grey);border:1px solid var(--line);}
  .btn-ghost:hover{border-color:var(--grey);}
  .btn-danger{background:var(--alert-soft);color:var(--alert);}
  .btn-absent{background:var(--absent-soft);color:var(--absent);}
  .btn-absent:hover{background:#d0d7e0;}
  .btn-sm{padding:5px 10px;font-size:12px;border-radius:7px;}
  .btn[disabled]{opacity:.5;cursor:not-allowed;}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:left;color:var(--grey);font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;
     border-bottom:1px solid var(--line);padding:8px 8px;}
  td{padding:9px 8px;border-bottom:1px solid #ECEFF2;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11.5px;font-weight:600;}
  .pill-route{background:var(--sky-pale);color:var(--sky-deep);}
  .admno{font-family:'IBM Plex Mono';font-size:11.5px;color:var(--grey);}
  .empty{color:var(--grey-light);font-size:13px;padding:18px 4px;text-align:center;}

  /* Journey tracker */
  .journey{display:flex;align-items:center;margin:10px 0 4px;}
  .j-node{display:flex;flex-direction:column;align-items:center;width:120px;text-align:center;}
  .j-dot{width:16px;height:16px;border-radius:50%;background:var(--grey-light);margin-bottom:6px;position:relative;border:3px solid var(--paper);box-shadow:0 0 0 2px var(--line);}
  .j-node.done .j-dot{background:var(--present);box-shadow:0 0 0 2px var(--present);}
  .j-node.missed .j-dot{background:var(--alert);box-shadow:0 0 0 2px var(--alert);animation:pulse 1.6s infinite;}
  .j-node.absent .j-dot{background:var(--absent);box-shadow:0 0 0 2px var(--absent);}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(216,84,63,.5);}70%{box-shadow:0 0 0 8px rgba(216,84,63,0);}100%{box-shadow:0 0 0 0 rgba(216,84,63,0);}}
  .j-label{font-size:12px;font-weight:600;color:var(--grey);}
  .j-node.done .j-label, .j-node.absent .j-label{color:var(--ink);}
  .j-time{display:block;font-family:'IBM Plex Mono';font-size:10.5px;font-weight:400;color:var(--grey-light);margin-top:1px;}
  .j-line{flex:1;height:2px;background:var(--line);margin:0 -4px 22px;}
  .j-line.filled{background:var(--present);}
  .j-line.absent-filled{background:var(--absent);}

  .status-banner{border-radius:11px;padding:12px 16px;font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:8px;margin-top:4px;}
  .status-present{background:var(--present-soft);color:var(--present);}
  .status-waiting{background:var(--waiting-soft);color:#8A6300;}
  .status-alert{background:var(--alert-soft);color:var(--alert);}
  .status-absent{background:var(--absent-soft);color:var(--absent);}
  .status-idle{background:#EDEFF2;color:var(--grey);}

  /* Calendar */
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-dow{font-size:10.5px;color:var(--grey-light);text-align:center;font-weight:700;text-transform:uppercase;}
  .cal-cell{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;
    font-size:12.5px;font-family:'IBM Plex Mono';border:1px solid var(--line);background:#fff;color:var(--grey);cursor:default;}
  .cal-cell.blank{border:none;background:transparent;}
  .cal-cell.present{background:var(--present);color:#fff;border-color:var(--present);}
  .cal-cell.bunk{background:var(--alert);color:#fff;border-color:var(--alert);}
  .cal-cell.waiting{background:var(--waiting);color:#fff;border-color:var(--waiting);}
  .cal-cell.absent{background:var(--absent);color:#fff;border-color:var(--absent);}
  .cal-cell.today-ring{box-shadow:0 0 0 2px var(--ink);}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;font-size:12px;color:var(--grey);}
  .legend span{display:inline-flex;align-items:center;gap:5px;}
  .legend i{width:10px;height:10px;border-radius:3px;display:inline-block;}

  .alert-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 4px;border-bottom:1px solid #ECEFF2;}
  .alert-row:last-child{border-bottom:none;}
  .alert-left{display:flex;align-items:center;gap:10px;}
  .alert-dot{width:9px;height:9px;border-radius:50%;background:var(--alert);flex:none;}
  .alert-resolved .alert-dot{background:var(--grey-light);}
  .alert-resolved{opacity:.55;}
  .alert-meta{font-size:12px;color:var(--grey);}

  .banner-info{background:var(--sky-pale);border:1px solid #CFE6F5;color:#1E5A80;border-radius:11px;padding:10px 14px;font-size:12.5px;margin-bottom:18px;}
  .banner-info b{color:#123C56;}

  .toggle-row{display:flex;align-items:center;gap:10px;}
  .switch{position:relative;width:44px;height:24px;flex:none;}
  .switch input{opacity:0;width:0;height:0;}
  .slider{position:absolute;inset:0;background:var(--line);border-radius:999px;cursor:pointer;transition:.15s;}
  .slider:before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.15s;}
  .switch input:checked + .slider{background:var(--present);}
  .switch input:checked + .slider:before{transform:translateX(20px);}
  .switch input:disabled + .slider{opacity:.5;cursor:not-allowed;}

  .muted{color:var(--grey-light);font-size:12px;}
  .flex-between{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  details.danger{margin-top:6px;}
  details.danger summary{cursor:pointer;color:var(--grey-light);font-size:12px;}

  /* Chooser / login screens */
  .chooser-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:6px;}
  @media (max-width:720px){.chooser-grid{grid-template-columns:1fr;}}
  .chooser-card{
    background:var(--card);border:1px solid var(--line);border-radius:18px;padding:26px;cursor:pointer;
    transition:.15s; text-align:left;
  }
  .chooser-card:hover{border-color:var(--sky-deep); box-shadow:0 4px 18px rgba(46,134,193,0.12);}
  .chooser-icon{width:46px;height:46px;border-radius:12px;background:var(--sky-pale);color:var(--sky-deep);
    display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
  .chooser-icon svg{width:22px;height:22px;}
  .status-banner svg{width:18px;height:18px;flex:none;}
  .chooser-card h3{margin:0 0 6px;font-size:17px;}
  .chooser-card p{margin:0;font-size:13px;color:var(--grey);line-height:1.5;}

  .login-wrap{max-width:380px;margin:30px auto 0;}
  .login-error{color:var(--alert);font-size:12.5px;margin-top:6px;}
  .child-card{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
  .child-avatar{width:44px;height:44px;border-radius:50%;background:var(--sky-pale);color:var(--sky-deep);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Space Grotesk';flex:none;}
</style>
</head>
<body>
<div id="app">
  <header class="top">
    <div class="top-row" id="headerRow"></div>
  </header>
  <div id="mainBanner"></div>
  <main id="main"></main>
</div>

<!-- Firebase SDKs (Modular v10) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDUJYoPhYt0vnQNLskj05ixvcrekH-aOSw",
    authDomain: "sbdav-bus-attendance.firebaseapp.com",
    projectId: "sbdav-bus-attendance",
    storageBucket: "sbdav-bus-attendance.firebasestorage.app",
    messagingSenderId: "333086778097",
    appId: "1:333086778097:web:4730810b1713771bce7f50",
    measurementId: "G-VG6N18GYJ7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const STAFF_PASSWORD = 'sbdav@2026';

  /* ---------------- Firebase storage helpers ---------------- */
  async function safeGet(key){
    try {
      const snap = await getDoc(doc(db, "app_data", key));
      if (snap.exists()) {
        return snap.data().value;
      }
      return null;
    } catch(e){
      console.error('Firebase get failed', e);
      return null;
    }
  }

  async function safeSet(key, value){
    try {
      await setDoc(doc(db, "app_data", key), { value: value });
      return true;
    } catch(e){
      console.error('Firebase set failed', e);
      return false;
    }
  }

  async function getStudents(){ return (await safeGet('students')) || []; }
  async function setStudents(list){ return safeSet('students', list); }
  async function getRoutes(){ return (await safeGet('routes')) || []; }
  async function setRoutes(list){ return safeSet('routes', list); }
  async function getAlerts(){ return (await safeGet('alerts')) || []; }
  async function setAlerts(list){ return safeSet('alerts', list); }
  async function getAttendance(studentId){ return (await safeGet('att:'+studentId)) || {}; }
  async function setAttendance(studentId, obj){ return safeSet('att:'+studentId, obj); }

  /* ---------------- utils ---------------- */
  function uid(prefix){ return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
  function todayStr(){
    const d = new Date();
    const tz = d.getTimezoneOffset()*60000;
    return new Date(d - tz).toISOString().slice(0,10);
  }
  function nowTime(){
    const d = new Date();
    return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  }
  function esc(s){ return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function fmtDateLabel(dstr){
    const [y,m,d] = dstr.split('-').map(Number);
    return new Date(y, m-1, d).toLocaleDateString([], {weekday:'short', month:'short', day:'numeric', year:'numeric'});
  }
  function initials(name){
    return (name||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]?.toUpperCase()||'').join('');
  }

  /* ---------------- icons ---------------- */
  const ICON = {
    bus: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="11" rx="2.2"></rect><line x1="3" y1="10.2" x2="21" y2="10.2"></line><line x1="8" y1="5" x2="8" y2="10.2"></line><line x1="14" y1="5" x2="14" y2="10.2"></line><circle cx="7.2" cy="18" r="1.6"></circle><circle cx="16.8" cy="18" r="1.6"></circle></svg>`,
    parent: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.4"></circle><path d="M5 20c0-4 3-6.5 7-6.5s7 2.5 7 6.5"></path></svg>`,
    check: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><path d="M8 12.5l2.6 2.6 5-5.6"></path></svg>`,
    alert: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3.5l9.2 16.2H2.8z"></path><line x1="12" y1="9.5" x2="12" y2="13.8"></line><circle cx="12" cy="16.8" r="0.9" fill="currentColor" stroke="none"></circle></svg>`,
    clock: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><path d="M12 7.2v5l3.4 2"></path></svg>`,
    dash: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><line x1="8.5" y1="12" x2="15.5" y2="12"></line></svg>`,
    absent: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><line x1="9" y1="9" x2="15" y2="15"></line><line x1="15" y1="9" x2="9" y2="15"></line></svg>`,
  };

  /* ---------------- state ---------------- */
  let state = {
    appMode: 'chooser', // 'chooser' | 'staff' | 'parent'
    staffTab: 'roster',
    manualRouteChoice: '',
    staffAuthed: false,
    staffPasswordInput: '',
    staffPasswordError: '',
    lookupQuery: '',
    conductorRoute: null,
    calStudentId: null,
    calMonth: new Date().getMonth(),
    calYear: new Date().getFullYear(),
    parentLoggedInId: null,
    parentLoginInput: '',
    parentLoginError: '',
  };

  function renderHeader(){
    const el = document.getElementById('headerRow');
    let titleHtml, subHtml, actionsHtml = '';
    if(state.appMode === 'chooser'){
      titleHtml = 'SBDAV Bus Register'; subHtml = 'Choose how you\'d like to sign in.';
    } else if(state.appMode === 'staff'){
      titleHtml = 'SBDAV Staff App'; subHtml = 'Routes, boarding &amp; the attendance register.';
      actionsHtml = `<button class="switch-app" id="switchAppBtn">Switch app</button>`;
    } else {
      titleHtml = 'SBDAV Parent App'; subHtml = 'Check in your child and follow their bus journey.';
      actionsHtml = `<button class="switch-app" id="switchAppBtn">Switch app</button>`;
    }
    el.innerHTML = `
      <div class="brand">
        <div class="brand-mark">SB</div>
        <div class="brand-text"><h1>${titleHtml}</h1><p>${subHtml}</p></div>
      </div>
      <div class="header-actions">${actionsHtml}</div>`;
    const sw = document.getElementById('switchAppBtn');
    if(sw) sw.onclick = ()=>{ state.appMode = 'chooser'; state.parentLoggedInId = null; state.staffAuthed = false; state.staffPasswordInput=''; state.staffPasswordError=''; render(); };
  }

  function renderBanner(){
    const el = document.getElementById('mainBanner');
    if(state.appMode === 'chooser'){ el.innerHTML = ''; return; }
    el.innerHTML = `
      <div class="banner-info">
        <b>Connected to Firebase Firestore.</b> Data updates instantly across all connected devices and persists permanently in the cloud.
      </div>`;
  }

  /* ================= MAIN RENDER ================= */
  async function render(){
    renderHeader();
    renderBanner();
    const main = document.getElementById('main');
    main.innerHTML = '<div class="empty">Loading from Firebase…</div>';
    if(state.appMode === 'chooser') main.innerHTML = renderChooser();
    else if(state.appMode === 'staff') main.innerHTML = await renderStaff();
    else main.innerHTML = await renderParent();
    attachHandlers();
  }

  function renderChooser(){
    return `
    <div class="chooser-grid">
      <div class="chooser-card" data-choose="staff">
        <div class="chooser-icon">${ICON.bus}</div>
        <h3>Staff App</h3>
        <p>For teachers, the bus in-charge and conductors. Add students, set up bus routes, confirm boarding and review the full attendance register.</p>
      </div>
      <div class="chooser-card" data-choose="parent">
        <div class="chooser-icon">${ICON.parent}</div>
        <h3>Parent App</h3>
        <p>Sign in with your child's admission number to check them in for the bus stop, declare absences, and see their attendance.</p>
      </div>
    </div>`;
  }

  /* ================= STAFF APP ================= */
  function renderStaffLogin(){
    return `
    <div class="login-wrap">
      <div class="card">
        <h2>Staff sign in</h2>
        <p class="sub">Enter the school's administration password to open the Staff App.</p>
        <div class="field">
          <label>Administration password</label>
          <input type="text" id="staffPasswordInput" placeholder="Password" value="${esc(state.staffPasswordInput)}">
        </div>
        ${state.staffPasswordError ? `<div class="login-error">${esc(state.staffPasswordError)}</div>` : ''}
        <button class="btn btn-sky" id="staffLoginBtn" style="margin-top:10px;width:100%;justify-content:center;">Sign in</button>
      </div>
    </div>`;
  }

  async function renderStaff(){
    if(!state.staffAuthed) return renderStaffLogin();
    const tabs = [
      {id:'roster', label:'Students & Buses'},
      {id:'lookup', label:'Bus Info Lookup'},
      {id:'boarding', label:'Boarding'},
      {id:'register', label:'Attendance Register'},
      {id:'alerts', label:'Alerts'},
    ];
    const tabsHtml = `<div class="subtabs">${tabs.map(t=>
      `<button data-stab="${t.id}" class="${state.staffTab===t.id?'active':''}">${t.label}</button>`).join('')}</div>`;

    let body = '';
    if(state.staffTab === 'roster') body = await renderRoster();
    else if(state.staffTab === 'lookup') body = await renderLookup();
    else if(state.staffTab === 'boarding') body = await renderBoarding();
    else if(state.staffTab === 'register') body = await renderRegister();
    else body = await renderAlertsPanel();

    return tabsHtml + body;
  }

  async function renderRoster(){
    const students = await getStudents();
    const routes = await getRoutes();
    const allRouteNames = Array.from(new Set([...routes, ...students.map(s=>s.route).filter(Boolean)])).sort();

    const routePicker = `
      <div class="field" style="margin-top:4px;">
        <label>Bus / route for this batch</label>
        <div class="row">
          <select id="manualRouteSelect">
            <option value="">— choose existing route —</option>
            ${allRouteNames.map(r=>`<option value="${esc(r)}" ${state.manualRouteChoice===r?'selected':''}>${esc(r)}</option>`).join('')}
          </select>
          <input type="text" id="newRouteName" placeholder="or type a new bus/route name">
        </div>
        <p class="muted" style="margin-top:6px;">Choose or create the route first — every student added or imported below goes straight onto it.</p>
      </div>`;

    return `
    <div class="grid-2">

  async function renderBoarding(){
    const students = await getStudents();
    const routes = await getRoutes();
    const allRouteNames = Array.from(new Set([...routes, ...students.map(s=>s.route).filter(Boolean)])).sort();
    if(!state.conductorRoute && allRouteNames.length) state.conductorRoute = allRouteNames[0];

    const picker = `
      <div class="card">
        <div class="flex-between">
          <div>
            <h2>Boarding — ${fmtDateLabel(todayStr())}</h2>
            <p class="sub">Confirm who actually boarded the bus on each route today.</p>
          </div>
          <select id="conductorRouteSelect" style="width:auto;min-width:200px;">
            ${allRouteNames.length===0 ? '<option>No routes yet</option>' :
              allRouteNames.map(r=>`<option value="${esc(r)}" ${r===state.conductorRoute?'selected':''}>${esc(r)}</option>`).join('')}
          </select>
        </div>
      </div>`;

    if(!state.conductorRoute) return picker + `<div class="card"><div class="empty">Set up routes under Students &amp; Buses first.</div></div>`;

    const routeStudents = students.filter(s=>s.route === state.conductorRoute);
    const today = todayStr();

    const rows = [];
    for(const s of routeStudents){
      const att = await getAttendance(s.id);
      const rec = att[today] || {};
      rows.push({s, rec});
    }

    const pendingBunks = rows.filter(r=>r.rec.left && !r.rec.boarded && !r.rec.absent).length;

    return picker + `
    <div class="card">
      <div class="flex-between">
        <div>
          <h2>${esc(state.conductorRoute)}</h2>
          <p class="sub">${routeStudents.length} student${routeStudents.length===1?'':'s'} on this route today</p>
        </div>
        <button class="btn btn-sky btn-sm" id="bunkCheckBtn" ${pendingBunks===0?'disabled':''}>Run bunk check${pendingBunks?` (${pendingBunks})`:''}</button>
      </div>
      <table>
        <thead><tr><th>Student</th><th>Adm. No.</th><th>Status / Journey</th><th>Boarded</th><th>Actions</th></tr></thead>
        <tbody>
          ${rows.length===0 ? '' : rows.map(({s,rec})=>`
            <tr>
              <td>${esc(s.name)}<div class="muted">${esc(s.className||'')}</div></td>
              <td class="admno">${esc(s.admissionNo||'—')}</td>
              <td>
                ${rec.absent ? '<span class="pill" style="background:var(--absent-soft);color:var(--absent);">Absent / Not Coming</span>' :
                  rec.left ? `<span class="pill" style="background:var(--present-soft);color:var(--present);">Left for stop ${rec.leftTime?('· '+esc(rec.leftTime)):''}</span>` : '<span class="muted">Not checked in</span>'}
              </td>
              <td>
                <label class="switch">
                  <input type="checkbox" data-board-student="${s.id}" ${rec.boarded?'checked':''} ${rec.absent?'disabled':''}>
                  <span class="slider"></span>
                </label>
              </td>
              <td>
                <div style="display:flex;gap:6px;align-items:center;">
                  ${!rec.absent ? `<button class="btn btn-absent btn-sm" data-mark-absent="${s.id}">Mark Absent</button>` : `<button class="btn btn-ghost btn-sm" data-unmark-absent="${s.id}">Undo Absent</button>`}
                  ${rec.alert && !rec.boarded ? '<span class="pill" style="background:var(--alert-soft);color:var(--alert);">Flagged</span>' : ''}
                </div>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
      ${rows.length===0 ? '<div class="empty">No students on this route yet.</div>' : ''}
    </div>`;
  }

    else if(rec.alert) banner = `<div class="status-banner status-alert">${ICON.alert}<span>Marked left for the stop but never boarded — the school has been alerted.</span></div>`;
    else if(rec.left) banner = `<div class="status-banner status-waiting">${ICON.clock}<span>Waiting for the conductor to confirm boarding…</span></div>`;

      </div>
    </div>

    <div class="card">

  /* ---------------- shared bits ---------------- */
  function journeyTracker(rec){
    const left = !!rec.left, boarded = !!rec.boarded, alert = !!rec.alert, absent = !!rec.absent;
    if(absent){
      return `
      <div class="journey">
        <div class="j-node absent">
          <div class="j-dot"></div>
          <div class="j-label">Absent / Not Coming Today</div>
        </div>
        <div class="j-line absent-filled"></div>
        <div class="j-node absent">
          <div class="j-dot"></div>
          <div class="j-label">No Bus Required</div>
        </div>
      </div>`;
    }
    const n2class = boarded ? 'done' : (alert ? 'missed' : 'pending');
    return `
    <div class="journey">
      <div class="j-node ${left?'done':'pending'}">
        <div class="j-dot"></div>
        <div class="j-label">Left for stop${rec.leftTime?`<span class="j-time">${esc(rec.leftTime)}</span>`:''}</div>
      </div>
      <div class="j-line ${left?'filled':''}"></div>
      <div class="j-node ${n2class}">
        <div class="j-dot"></div>
        <div class="j-label">Boarded bus${rec.boardTime?`<span class="j-time">${esc(rec.boardTime)}</span>`:''}</div>
      </div>
    </div>`;
  }

  function dayStatus(rec, dateStr, todayS){
    if(!rec) return 'none';
    if(rec.absent) return 'absent';
    if(rec.boarded) return 'present';
    if(rec.left && rec.alert) return 'bunk';
    if(rec.left && dateStr === todayS) return 'waiting';
    if(rec.left && dateStr < todayS) return 'bunk';
    return 'none';
  }

  async function renderCalendarBlock(studentId){
    const att = await getAttendance(studentId);
    const today = todayStr();
    const y = state.calYear, m = state.calMonth;
    const first = new Date(y, m, 1);
    const startDow = first.getDay();
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const monthLabel = first.toLocaleDateString([], {month:'long', year:'numeric'});

    let cells = '';
    for(let i=0;i<startDow;i++) cells += `<div class="cal-cell blank"></div>`;
    for(let d=1; d<=daysInMonth; d++){
      const dstr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const rec = att[dstr];
      const status = dayStatus(rec, dstr, today);
      const ring = dstr === today ? 'today-ring' : '';
      cells += `<div class="cal-cell ${status} ${ring}" title="${dstr}">${d}</div>`;
    }

    return `
      <h2>Attendance register</h2>
      <div class="cal-head">
        <button class="btn btn-ghost btn-sm" data-cal-nav="-1">← Prev</button>
        <b>${monthLabel}</b>
        <button class="btn btn-ghost btn-sm" data-cal-nav="1">Next →</button>
      </div>
      <div class="cal-grid">
        ${['S','M','T','W','T','F','S'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}
        ${cells}
      </div>
      <div class="legend">
        <span><i style="background:var(--present);"></i>Present</span>
        <span><i style="background:var(--absent);"></i>Absent / Not Coming</span>
        <span><i style="background:var(--waiting);"></i>Left, awaiting boarding</span>
        <span><i style="background:var(--alert);"></i>Left but never boarded</span>
        <span><i style="background:#fff;border:1px solid var(--line);"></i>No record</span>
      </div>`;
  }

  function parseCsvLine(line){
    return line.split(',').map(s=>s.trim());
  }

  /* ---------------- event wiring ---------------- */
  function attachHandlers(){
    const main = document.getElementById('main');

    main.querySelectorAll('[data-choose]').forEach(c=>{
      c.onclick = ()=>{ state.appMode = c.dataset.choose; render(); };
    });

    const staffLoginBtn = main.querySelector('#staffLoginBtn');
    const staffPasswordInput = main.querySelector('#staffPasswordInput');
    if(staffLoginBtn) staffLoginBtn.onclick = ()=>{
      const val = staffPasswordInput.value;
      state.staffPasswordInput = val;
      if(val === STAFF_PASSWORD){ state.staffAuthed = true; state.staffPasswordError = ''; state.staffPasswordInput=''; render(); }
      else { state.staffPasswordError = 'Incorrect password.'; render(); }
    };
    if(staffPasswordInput) staffPasswordInput.onkeydown = (e)=>{ if(e.key==='Enter') staffLoginBtn?.click(); };

    main.querySelectorAll('[data-stab]').forEach(b=>{
      b.onclick = ()=>{ state.staffTab = b.dataset.stab; render(); };
    });

    const manualRouteSelect = main.querySelector('#manualRouteSelect');
    if(manualRouteSelect) manualRouteSelect.onchange = ()=>{ state.manualRouteChoice = manualRouteSelect.value; };

    const addBtn = main.querySelector('#addStudentBtn');
    if(addBtn) addBtn.onclick = async ()=>{
      const name = main.querySelector('#stuName').value.trim();
      const admissionNo = main.querySelector('#stuAdm').value.trim();
      if(!name){ alert('Please enter the student name.'); return; }
      if(!admissionNo){ alert('Please enter the admission number.'); return; }
      const className = main.querySelector('#stuClass').value.trim();
      const area = main.querySelector('#stuArea').value.trim();
      const parentName = main.querySelector('#stuParent').value.trim();
      const newRoute = main.querySelector('#newRouteName').value.trim();
      const route = newRoute || state.manualRouteChoice || '';
      if(!route){ alert('Choose or create a bus/route for this student first.'); return; }
      const students = await getStudents();
      if(students.some(s=>s.admissionNo && s.admissionNo.toLowerCase()===admissionNo.toLowerCase())){
        if(!confirm('That admission number is already used. Add this student anyway?')) return;
      }
      students.push({id: uid('s'), name, admissionNo, className, area, parentName, route});
      await setStudents(students);
      if(route){
        const routes = await getRoutes();
        if(!routes.includes(route)){ routes.push(route); await setRoutes(routes); }
      }
      render();
    };

    const importFile = main.querySelector('#importFile');
    if(importFile) importFile.onchange = ()=>{
      const file = importFile.files[0];
      if(!file) return;
      const fileName = (file.name || '').toLowerCase();
      const isExcel = fileName.endsWith('.xlsx') || fileName.endsWith('.xls');

      const processRows = async (rows)=>{
        const students = await getStudents();
        const routes = await getRoutes();
        const newRoute = main.querySelector('#newRouteName')?.value.trim();
        const manualRoute = newRoute || state.manualRouteChoice || '';
        if(!manualRoute){ alert('Choose or create a bus/route for this import first.'); return; }
        let added = 0, skipped = 0;
        for(const row of rows){
          const parts = row.map(v => String(v ?? '').trim());
          if(parts.length < 1 || !parts[0]) continue;
          if(parts[0].toLowerCase() === 'name') continue;
          const [name, admissionNo='', className='', area='', parentName=''] = parts;
          if(!admissionNo){ skipped++; continue; }
          students.push({id: uid('s'), name, admissionNo, className, area, parentName, route: manualRoute});
          added++;
        }
        await setStudents(students);
        if(manualRoute && !routes.includes(manualRoute)){ routes.push(manualRoute); await setRoutes(routes); }
        const preview = main.querySelector('#importPreview');
        if(preview) preview.innerHTML = `<p class="sub" style="margin-top:8px;">Imported ${added} student(s).${skipped?` Skipped ${skipped} row(s).`:''}</p>`;
        render();
      };

      const reader = new FileReader();
      if(isExcel){
        reader.onload = async (e)=>{
          try{
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type:'array'});
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(firstSheet, {header:1, blankrows:false});
            await processRows(rows);
          }catch(err){
            console.error(err);
            alert('Could not read that Excel file.');
          }
        };
        reader.readAsArrayBuffer(file);
      } else {
        reader.onload = async (e)=>{
          const text = e.target.result || '';
          const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
          const rows = lines.map(parseCsvLine);
          await processRows(rows);
        };
        reader.readAsText(file);
      }
    };

    main.querySelectorAll('[data-student-route]').forEach(sel=>{
      sel.onchange = async ()=>{
        const id = sel.dataset.studentRoute;
        const students = await getStudents();
        const s = students.find(x=>x.id===id);
        if(s){
          s.route = sel.value;
          await setStudents(students);
          if(sel.value){
            const routes = await getRoutes();
            if(!routes.includes(sel.value)){ routes.push(sel.value); await setRoutes(routes); }
          }
        }
        render();
      };
    });

    main.querySelectorAll('[data-del-student]').forEach(btn=>{
      btn.onclick = async ()=>{
        if(!confirm('Remove this student from the roster?')) return;
        const id = btn.dataset.delStudent;
        let students = await getStudents();
        students = students.filter(s=>s.id!==id);
        await setStudents(students);
        render();
      };
    });

    const wipeBtn = main.querySelector('#wipeBtn');
    if(wipeBtn) wipeBtn.onclick = async ()=>{
      if(!confirm('This clears every student, route and attendance record from Firebase. Continue?')) return;
      const students = await getStudents();
      await setStudents([]);
      await setRoutes([]);
      await setAlerts([]);
      for(const s of students) await setAttendance(s.id, {});
      render();
    };

    const lookupBtn = main.querySelector('#lookupBtn');
    const lookupInput = main.querySelector('#lookupInput');
    if(lookupBtn) lookupBtn.onclick = ()=>{ state.lookupQuery = lookupInput.value; render(); };
    if(lookupInput) lookupInput.onkeydown = (e)=>{ if(e.key==='Enter'){ state.lookupQuery = lookupInput.value; render(); } };

    main.querySelectorAll('[data-resolve-alert]').forEach(btn=>{
      btn.onclick = async ()=>{
        const id = btn.dataset.resolveAlert;
        const alerts = await getAlerts();
        const a = alerts.find(x=>x.id===id);
        if(a) a.resolved = true;
        await setAlerts(alerts);
        render();
      };
    });

    const parentLoginBtn = main.querySelector('#parentLoginBtn');
    const parentAdmInput = main.querySelector('#parentAdmInput');
    if(parentLoginBtn) parentLoginBtn.onclick = async ()=>{
      const val = parentAdmInput.value.trim();
      state.parentLoginInput = val;
      if(!val){ state.parentLoginError = 'Enter an admission number.'; render(); return; }
      const students = await getStudents();
      const match = students.find(s => (s.admissionNo||'').toLowerCase() === val.toLowerCase());
      if(!match){ state.parentLoginError = 'No student found with that admission number.'; render(); return; }
      state.parentLoginError = '';
      state.parentLoggedInId = match.id;
      render();
    };
    if(parentAdmInput) parentAdmInput.onkeydown = (e)=>{ if(e.key==='Enter') parentLoginBtn?.click(); };

    const parentLogoutBtn = main.querySelector('#parentLogoutBtn');
    if(parentLogoutBtn) parentLogoutBtn.onclick = ()=>{
      state.parentLoggedInId = null;
      state.parentLoginInput = '';
      render();
    };

    const leftToggle = main.querySelector('#leftToggle');
    if(leftToggle) leftToggle.onchange = async ()=>{
      const id = state.parentLoggedInId;
      const today = todayStr();
      const att = await getAttendance(id);
      const rec = att[today] || {};
      rec.left = leftToggle.checked;
      rec.leftTime = leftToggle.checked ? nowTime() : undefined;
      att[today] = rec;
      await setAttendance(id, att);
      render();
    };

    const parentAbsentBtn = main.querySelector('#parentAbsentBtn');
    if(parentAbsentBtn) parentAbsentBtn.onclick = async ()=>{
      const id = state.parentLoggedInId;
      const today = todayStr();
      const att = await getAttendance(id);
      const rec = att[today] || {};
      rec.absent = true;
      rec.left = false;
      rec.boarded = false;
      rec.alert = false;
      att[today] = rec;
      await setAttendance(id, att);
      render();
    };

    const parentUndoAbsentBtn = main.querySelector('#parentUndoAbsentBtn');
    if(parentUndoAbsentBtn) parentUndoAbsentBtn.onclick = async ()=>{
      const id = state.parentLoggedInId;
      const today = todayStr();
      const att = await getAttendance(id);
      const rec = att[today] || {};
      rec.absent = false;
      att[today] = rec;
      await setAttendance(id, att);
      render();
    };

    const condSel = main.querySelector('#conductorRouteSelect');
    if(condSel) condSel.onchange = ()=>{ state.conductorRoute = condSel.value; render(); };

    main.querySelectorAll('[data-board-student]').forEach(chk=>{
      chk.onchange = async ()=>{
        const id = chk.dataset.boardStudent;
        const today = todayStr();
        const att = await getAttendance(id);
        const rec = att[today] || {};
        rec.boarded = chk.checked;
        if(chk.checked){ rec.boardTime = nowTime(); rec.alert = false; rec.absent = false; }
        else { rec.boardTime = undefined; }
        att[today] = rec;
        await setAttendance(id, att);
        render();
      };
    });

    main.querySelectorAll('[data-mark-absent]').forEach(btn=>{
      btn.onclick = async ()=>{
        const id = btn.dataset.markAbsent;
        const today = todayStr();
        const att = await getAttendance(id);
        const rec = att[today] || {};
        rec.absent = true;
        rec.left = false;
        rec.boarded = false;
        rec.alert = false;
        att[today] = rec;
        await setAttendance(id, att);
        render();
      };
    });

    main.querySelectorAll('[data-unmark-absent]').forEach(btn=>{
      btn.onclick = async ()=>{
        const id = btn.dataset.unmarkAbsent;
        const today = todayStr();
        const att = await getAttendance(id);
        const rec = att[today] || {};
        rec.absent = false;
        att[today] = rec;
        await setAttendance(id, att);
        render();
      };
    });

    const bunkBtn = main.querySelector('#bunkCheckBtn');
    if(bunkBtn) bunkBtn.onclick = async ()=>{
      const students = (await getStudents()).filter(s=>s.route===state.conductorRoute);
      const today = todayStr();
      const alerts = await getAlerts();
      let flagged = 0;
      for(const s of students){
        const att = await getAttendance(s.id);
        const rec = att[today] || {};
        if(rec.left && !rec.boarded && !rec.absent && !rec.alert){
          rec.alert = true;
          att[today] = rec;
          await setAttendance(s.id, att);
          alerts.push({
            id: uid('a'), studentId: s.id, studentName: s.name, admissionNo: s.admissionNo, route: s.route,
            date: today, time: nowTime(), ts: Date.now(), resolved: false
          });
          flagged++;
        }
      }
      await setAlerts(alerts);
      alert(flagged ? `Flagged ${flagged} student(s) who left for the stop but never boarded.` : 'No unboarded students to flag.');
      render();
    };

    const regSel = main.querySelector('#registerStudentSelect');
    if(regSel) regSel.onchange = ()=>{ state.calStudentId = regSel.value; render(); };

    main.querySelectorAll('[data-cal-nav]').forEach(btn=>{
      btn.onclick = ()=>{
        const delta = parseInt(btn.dataset.calNav,10);
        state.calMonth += delta;
        if(state.calMonth < 0){ state.calMonth = 11; state.calYear--; }
        if(state.calMonth > 11){ state.calMonth = 0; state.calYear++; }
        render();
      };
    });
  }

  render();
</script>
</body>
</html>
